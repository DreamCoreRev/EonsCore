name: Windows Build Release

on:
  push:
    paths-ignore:
      - 'sql/**'
  pull_request:
    paths-ignore:
      - 'sql/**'

concurrency:
  group: ${{ github.head_ref }} || concat(${{ github.ref }}, ${{ github.workflow }})
  cancel-in-progress: true

env:
  BUILD_TYPE: RelWithDebInfo
  REPO_DIR: ${{ github.workspace }}
  BUILD_DIR: ${{ github.workspace }}/bin/builddir
  BOOST_TOOLSET: "msvc"
  BOOST_VERSION: "1.78.0"

jobs:
  build:
    runs-on: windows-2022
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: FranzDiebold/github-env-vars-action@v2.8.0

      # ── 2. Créer le dossier de build ─────────────────────────────────────────
      - name: Create Build Environment
        shell: powershell
        run: |
          echo "ARCHIVE_FILENAME=$env:CI_REPOSITORY_NAME-$env:CI_SHA_SHORT.zip" >> $env:GITHUB_ENV
          cmake -E make_directory "${{ env.BUILD_DIR }}"

      # ── 3. Installer les dépendances via Chocolatey ───────────────────────────
      # On utilise choco comme dans le fichier windows-build.yml de référence.
      # - openssl  → installe dans C:\Program Files\OpenSSL-Win64, écrit le registre
      # - mysql    → installe dans C:\mysql (libmysql.dll, includes, libs)
      # On ne force PAS de version de cmake : l'image windows-2022 a déjà cmake 3.x
      # et TrinityCore 3.3.5 est compatible avec les versions récentes de CMake.
      - name: Install dependencies (choco)
        shell: bash
        run: |
          choco install -y openssl
          choco install -y mysql

      # ── 4. Installer Boost 1.78.0 ────────────────────────────────────────────
      - name: Install Boost
        uses: MarkusJx/install-boost@v2.5.1
        id: install-boost
        with:
          boost_version: ${{ env.BOOST_VERSION }}
          platform_version: 2022
          toolset: ${{ env.BOOST_TOOLSET }}

      # ── 5. Configure (CMake) ─────────────────────────────────────────────────
      # OpenSSL installé par choco dans "C:/Program Files/OpenSSL-Win64"
      # MySQL installé par choco dans "C:/mysql"
      - name: Configure with CMake
        shell: bash
        env:
          BOOST_ROOT: ${{ steps.install-boost.outputs.BOOST_ROOT }}
        run: |
          cd "${{ env.BUILD_DIR }}"
          cmake "${{ env.REPO_DIR }}" \
            -A x64 \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DTOOLS=ON \
            -DSCRIPTS=dynamic \
            -DSERVERS=1 \
            -DUSE_COREPCH=1 \
            -DUSE_SCRIPTPCH=1 \
            -DNOJEM=0 \
            -DWITH_WARNINGS=0 \
            -DWITH_COREDEBUG=0 \
            -DMYSQL_INCLUDE_DIR="C:/mysql/include" \
            -DMYSQL_LIBRARY="C:/mysql/lib/libmysql.lib" \
            -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL-Win64" \
            -DBOOST_ROOT="${{ steps.install-boost.outputs.BOOST_ROOT }}" \
            -DCMAKE_INSTALL_PREFIX="${{ env.BUILD_DIR }}/install"

      # ── 6. Build ─────────────────────────────────────────────────────────────
      - name: Build
        shell: bash
        run: |
          cmake --build "${{ env.BUILD_DIR }}" \
            --config ${{ env.BUILD_TYPE }} \
            --parallel 4

      # ── 7. Copier les DLL runtime et créer l'archive ──────────────────────────
      - name: Archive binaries
        shell: bash
        run: |
          BIN_DIR="${{ env.BUILD_DIR }}/bin/${{ env.BUILD_TYPE }}"

          # MySQL
          cp "c:/mysql/lib/libmysql.dll" "$BIN_DIR/libmysql.dll"

          # OpenSSL 3.x (choco installe OpenSSL 3, noms de DLL avec -3-)
          cp "c:/Program Files/OpenSSL-Win64/bin/libssl-3-x64.dll"    "$BIN_DIR/libssl-3-x64.dll"    || \
          cp "c:/Program Files/OpenSSL-Win64/bin/libssl-1_1-x64.dll"  "$BIN_DIR/libssl-1_1-x64.dll"  || true
          cp "c:/Program Files/OpenSSL-Win64/bin/libcrypto-3-x64.dll" "$BIN_DIR/libcrypto-3-x64.dll" || \
          cp "c:/Program Files/OpenSSL-Win64/bin/libcrypto-1_1-x64.dll" "$BIN_DIR/libcrypto-1_1-x64.dll" || true

          echo "=== Binaries ==="
          ls -la "$BIN_DIR"

      # ── 8. Vérifier les exécutables ───────────────────────────────────────────
      - name: Check executables
        shell: bash
        run: |
          BIN_DIR="${{ env.BUILD_DIR }}/bin/${{ env.BUILD_TYPE }}"
          "$BIN_DIR/authserver.exe"  --version
          "$BIN_DIR/worldserver.exe" --version

      # ── 9. Upload artifact ────────────────────────────────────────────────────
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EonsCore-Win64-${{ env.CI_SHA_SHORT }}
          path: ${{ env.BUILD_DIR }}/bin/${{ env.BUILD_TYPE }}/
          retention-days: 7
